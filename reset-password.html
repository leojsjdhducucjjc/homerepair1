<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Jason's Lake Ozarks Pro Painting and Remodeling</title>
    <meta name="description" content="Change the owner dashboard password." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="./favicon.ico" />

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicons/favicon-32x32.png" />

    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicons/favicon-16x16.png" />

    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <link rel="stylesheet" href="./src/css/styles.css" />
  </head>
  <body class="dashboard-page login-page">
    <main class="page-wrap">
      <article class="flyer">
        <div class="sticky-nav-shell">
          <header class="top-header">
            <div class="brand-block">
              <a class="brand-home-link" href="./index.html" aria-label="Go to Home"><img class="brand-logo" src="./assets/header-logo.png" alt="Jason's Lake Ozarks Pro Painting and Remodeling logo" /></a>
            </div>
          </header>
        </div>

        <section class="page-content login-content">
          <article class="content-card login-card">
            <p class="login-kicker">Security</p>
            <h1>Reset Dashboard Password</h1>
            <p class="login-copy">Choose a new password for the owner dashboard. Use at least 8 characters.</p>
            <p class="form-status" data-reset-status role="alert" aria-live="polite"></p>

            <form class="login-form" method="post" action="/auth/reset-password">
              <div>
                <label for="currentPassword">Current Password</label>
                <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required />
              </div>
              <div>
                <label for="newPassword">New Password</label>
                <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required />
              </div>
              <div>
                <label for="confirmPassword">Confirm New Password</label>
                <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required />
              </div>
              <div class="password-actions">
                <a class="dashboard-secondary-link" href="./dashboard">Back to Dashboard</a>
                <button class="submit-btn" type="submit">Save New Password</button>
              </div>
            </form>
          </article>
        </section>
      </article>
    </main>
    <script src="./src/js/main.js"></script>
  </body>
</html>
